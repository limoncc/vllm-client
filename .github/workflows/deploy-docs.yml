name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        run: cargo install mdbook --version 0.4.34

      - name: Build English docs
        run: mdbook build docs -d docs/book
        working-directory: .

      - name: Build Chinese docs
        run: mdbook build docs/zh -d docs/book/zh
        working-directory: .

      - name: Copy English landing page to root
        run: |
          cp docs/landing/index.html docs/book/index.html
          cp -r docs/landing/zh/* docs/book/zh/

      - name: Copy favicon and fonts to landing
        run: |
          cp docs/book/favicon.svg docs/landing/
          cp docs/book/favicon.png docs/landing/
          cp -r docs/book/fonts docs/landing/fonts 2>/dev/null || true
          cp -r docs/book/FontAwesome docs/landing/FontAwesome 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/book'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
