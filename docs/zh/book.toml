[book]
authors = ["limoncc"]
language = "zh-CN"
src = "src"
title = "vLLM Client - vLLM API 的 Rust 客户端"
description = "一个兼容 OpenAI 接口的 vLLM API Rust 客户端库"

[build]
build-dir = "book"
create-missing = true

[output.html]
git-repository-url = "https://github.com/limoncc/vllm-client"
edit-url-template = "https://github.com/limoncc/vllm-client/edit/main/docs/zh/{path}"
site-url = "/vllm-client/zh/"
additional-css = ["../theme/custom.css"]
additional-js = ["../theme/custom.js"]
default-theme = "rust"
preferred-dark-theme = "ayu"
smart-punctuation = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.fold]
enable = true
level = 1

[output.linkcheck]
optional = true
follow-web-links = true
